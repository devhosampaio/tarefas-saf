<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/style.css">
  <title>Tarefas SAF</title>
</head>

<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Tarefas SAF</h1>
        <p class="subtitle">Organize demandas, prazos e prioridades.</p>
      </div>
      <button class="add-btn" id="openForm" title="Nova tarefa">+</button>
    </div>
  </header>

  <main>
    <section id="dashboardView">
      <div class="stats">
        <div class="stat"><strong id="totalTasks">0</strong><span>Total</span></div>
        <div class="stat"><strong id="pendingTasks">0</strong><span>Pendentes</span></div>
        <div class="stat"><strong id="doneTasks">0</strong><span>Concluídas</span></div>
      </div>
    </section>

    <section class="panel form-panel" id="formPanel">
      <h3 class="panel-title" id="formTitle">Nova tarefa</h3>

      <form id="taskForm">
        <input type="hidden" id="taskId" />

        <label for="name">Nome da tarefa</label>
        <input id="name" required placeholder="Ex: Atualizar planilha de beneficiários" />

        <label for="description">Descrição</label>
        <textarea id="description" placeholder="Detalhe o que precisa ser feito..."></textarea>

        <label for="requestedBy">Quem passou a tarefa</label>
        <input id="requestedBy" placeholder="Ex: Coordenação, supervisor, colega..." />

        <div class="row">
          <div>
            <label for="priority">Prioridade</label>
            <select id="priority">
              <option value="Alta">Alta</option>
              <option value="Média" selected>Média</option>
              <option value="Baixa">Baixa</option>
            </select>
          </div>

          <div>
            <label for="date">Data</label>
            <input id="date" type="date" required />
          </div>
        </div>

        <div class="actions">
          <button class="secondary" type="button" id="cancelForm">Cancelar</button>
          <button class="primary" type="submit">Salvar</button>
        </div>
      </form>
    </section>

    <section id="tasksView">
      <div class="filters">
        <button class="chip active" data-filter="todas">Todas</button>
        <button class="chip" data-filter="pendentes">Pendentes</button>
        <button class="chip" data-filter="concluidas">Concluídas</button>
        <button class="chip" data-filter="alta">Alta</button>
      </div>

      <div class="task-list" id="taskList"></div>
    </section>

    <section id="aboutView" class="panel hidden">
      <h3 class="panel-title">Sobre o app</h3>
      <p style="color: var(--muted); line-height: 1.5; margin: 0;">
        Este app salva suas tarefas diretamente no navegador do celular.
        Os dados continuam salvos mesmo se você fechar a página, desde que não limpe os dados do navegador.
      </p>
      <div class="actions">
        <button class="secondary" id="exportBtn">Exportar backup</button>
        <button class="secondary" id="importBtn">Importar</button>
        <input type="file" id="importFile" accept=".json" hidden />
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard">Início</button>
    <button class="nav-btn" data-view="tasks">Tarefas</button>
    <button class="nav-btn" data-view="about">Backup</button>
  </nav>

  <script src="./js/script.js"></script>
</body>

</html>
