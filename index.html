<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarefas SAF</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --card: #ffffff;
      --text: #1f2a24;
      --muted: #6f7a72;
      --line: #e4e8e1;
      --main: #2f6b4f;
      --main-soft: #e8f1ec;
      --danger: #b44747;
      --shadow: 0 12px 30px rgba(35, 51, 42, .08);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 92px;
    }

    header {
      padding: 26px 18px 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.65rem;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .add-btn {
      border: 0;
      width: 48px;
      height: 48px;
      border-radius: 18px;
      background: var(--main);
      color: white;
      font-size: 1.6rem;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    main {
      padding: 0 18px;
      max-width: 680px;
      margin: 0 auto;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0 18px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
      letter-spacing: -0.04em;
    }

    .stat span {
      font-size: .75rem;
      color: var(--muted);
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
    }

    .panel-title {
      margin: 0 0 14px;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      margin: 12px 0 6px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fafbf8;
      padding: 13px 14px;
      font: inherit;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--main);
      background: white;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .primary, .secondary {
      border: 0;
      border-radius: 16px;
      padding: 13px 14px;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
    }

    .primary {
      background: var(--main);
      color: white;
    }

    .secondary {
      background: var(--main-soft);
      color: var(--main);
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 14px;
    }

    .chip {
      flex: none;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 650;
    }

    .chip.active {
      background: var(--main);
      color: white;
      border-color: var(--main);
    }

    .task-list {
      display: grid;
      gap: 12px;
    }

    .task {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .task.done {
      opacity: .62;
    }

    .task-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .task h2 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.03em;
    }

    .task p {
      margin: 9px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: .92rem;
      white-space: pre-wrap;
    }

    .badge {
      border-radius: 999px;
      padding: 7px 10px;
      font-size: .72rem;
      font-weight: 800;
      flex: none;
    }

    .alta { background: #f8e9e9; color: #a83737; }
    .media { background: #f4eee1; color: #8a641f; }
    .baixa { background: #e8f1ec; color: #2f6b4f; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      font-size: .78rem;
    }

    .meta span {
      background: #f4f6f2;
      border-radius: 999px;
      padding: 7px 9px;
    }

    .task-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 44px;
      gap: 8px;
      margin-top: 14px;
    }

    .small-btn {
      border: 0;
      border-radius: 14px;
      padding: 11px 10px;
      font-weight: 700;
      background: #f4f6f2;
      color: var(--text);
      cursor: pointer;
    }

    .small-btn.delete {
      color: var(--danger);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 32px 20px;
    }

    .bottom-nav {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 14px;
      max-width: 680px;
      margin: 0 auto;
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: 0 20px 40px rgba(35, 51, 42, .16);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 8px;
      backdrop-filter: blur(14px);
    }

    .nav-btn {
      border: 0;
      background: transparent;
      border-radius: 18px;
      padding: 10px 4px;
      color: var(--muted);
      font-weight: 750;
      cursor: pointer;
      font-size: .78rem;
    }

    .nav-btn.active {
      background: var(--main-soft);
      color: var(--main);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 420px) {
      .row {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Tarefas SAF</h1>
        <p class="subtitle">Organize demandas, prazos e prioridades.</p>
      </div>
      <button class="add-btn" id="openForm" title="Nova tarefa">+</button>
    </div>
  </header>

  <main>
    <section id="dashboardView">
      <div class="stats">
        <div class="stat"><strong id="totalTasks">0</strong><span>Total</span></div>
        <div class="stat"><strong id="pendingTasks">0</strong><span>Pendentes</span></div>
        <div class="stat"><strong id="doneTasks">0</strong><span>Concluídas</span></div>
      </div>
    </section>

    <section class="panel form-panel" id="formPanel">
      <h3 class="panel-title" id="formTitle">Nova tarefa</h3>

      <form id="taskForm">
        <input type="hidden" id="taskId" />

        <label for="name">Nome da tarefa</label>
        <input id="name" required placeholder="Ex: Atualizar planilha de beneficiários" />

        <label for="description">Descrição</label>
        <textarea id="description" placeholder="Detalhe o que precisa ser feito..."></textarea>

        <label for="requestedBy">Quem passou a tarefa</label>
        <input id="requestedBy" placeholder="Ex: Coordenação, supervisor, colega..." />

        <div class="row">
          <div>
            <label for="priority">Prioridade</label>
            <select id="priority">
              <option value="Alta">Alta</option>
              <option value="Média" selected>Média</option>
              <option value="Baixa">Baixa</option>
            </select>
          </div>

          <div>
            <label for="date">Data</label>
            <input id="date" type="date" required />
          </div>
        </div>

        <div class="actions">
          <button class="secondary" type="button" id="cancelForm">Cancelar</button>
          <button class="primary" type="submit">Salvar</button>
        </div>
      </form>
    </section>

    <section id="tasksView">
      <div class="filters">
        <button class="chip active" data-filter="todas">Todas</button>
        <button class="chip" data-filter="pendentes">Pendentes</button>
        <button class="chip" data-filter="concluidas">Concluídas</button>
        <button class="chip" data-filter="alta">Alta</button>
      </div>

      <div class="task-list" id="taskList"></div>
    </section>

    <section id="aboutView" class="panel hidden">
      <h3 class="panel-title">Sobre o app</h3>
      <p style="color: var(--muted); line-height: 1.5; margin: 0;">
        Este app salva suas tarefas diretamente no navegador do celular. 
        Os dados continuam salvos mesmo se você fechar a página, desde que não limpe os dados do navegador.
      </p>
      <div class="actions">
        <button class="secondary" id="exportBtn">Exportar backup</button>
        <button class="secondary" id="importBtn">Importar</button>
        <input type="file" id="importFile" accept=".json" hidden />
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard">Início</button>
    <button class="nav-btn" data-view="tasks">Tarefas</button>
    <button class="nav-btn" data-view="about">Backup</button>
  </nav>

  <script>
    const STORAGE_KEY = "tarefas_saf_v1";
    let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentFilter = "todas";

    const formPanel = document.getElementById("formPanel");
    const taskForm = document.getElementById("taskForm");
    const taskList = document.getElementById("taskList");

    const taskId = document.getElementById("taskId");
    const nameInput = document.getElementById("name");
    const descInput = document.getElementById("description");
    const requestedByInput = document.getElementById("requestedBy");
    const priorityInput = document.getElementById("priority");
    const dateInput = document.getElementById("date");

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      render();
    }

    function formatDate(value) {
      if (!value) return "Sem data";
      const [year, month, day] = value.split("-");
      return `${day}/${month}/${year}`;
    }

    function priorityClass(priority) {
      if (priority === "Alta") return "alta";
      if (priority === "Baixa") return "baixa";
      return "media";
    }

    function getFilteredTasks() {
      const sorted = [...tasks].sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return new Date(a.date) - new Date(b.date);
      });

      if (currentFilter === "pendentes") return sorted.filter(t => !t.done);
      if (currentFilter === "concluidas") return sorted.filter(t => t.done);
      if (currentFilter === "alta") return sorted.filter(t => t.priority === "Alta");
      return sorted;
    }

    function renderStats() {
      document.getElementById("totalTasks").textContent = tasks.length;
      document.getElementById("pendingTasks").textContent = tasks.filter(t => !t.done).length;
      document.getElementById("doneTasks").textContent = tasks.filter(t => t.done).length;
    }

    function renderTasks() {
      const filtered = getFilteredTasks();

      if (filtered.length === 0) {
        taskList.innerHTML = `<div class="empty">Nenhuma tarefa encontrada.</div>`;
        return;
      }

      taskList.innerHTML = filtered.map(task => `
        <article class="task ${task.done ? "done" : ""}">
          <div class="task-head">
            <h2>${escapeHTML(task.name)}</h2>
            <span class="badge ${priorityClass(task.priority)}">${task.priority}</span>
          </div>

          ${task.description ? `<p>${escapeHTML(task.description)}</p>` : ""}

          <div class="meta">
            <span>📅 ${formatDate(task.date)}</span>
            <span>👤 ${escapeHTML(task.requestedBy || "Não informado")}</span>
          </div>

          <div class="task-actions">
            <button class="small-btn" onclick="toggleDone('${task.id}')">
              ${task.done ? "Reabrir" : "Concluir"}
            </button>
            <button class="small-btn" onclick="editTask('${task.id}')">Editar</button>
            <button class="small-btn delete" onclick="deleteTask('${task.id}')">×</button>
          </div>
        </article>
      `).join("");
    }

    function render() {
      renderStats();
      renderTasks();
    }

    function resetForm() {
      taskId.value = "";
      nameInput.value = "";
      descInput.value = "";
      requestedByInput.value = "";
      priorityInput.value = "Média";
      dateInput.value = new Date().toISOString().split("T")[0];
      document.getElementById("formTitle").textContent = "Nova tarefa";
    }

    function openForm() {
      formPanel.classList.add("active");
      nameInput.focus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function closeForm() {
      formPanel.classList.remove("active");
      resetForm();
    }

    taskForm.addEventListener("submit", event => {
      event.preventDefault();

      const data = {
        id: taskId.value || crypto.randomUUID(),
        name: nameInput.value.trim(),
        description: descInput.value.trim(),
        requestedBy: requestedByInput.value.trim(),
        priority: priorityInput.value,
        date: dateInput.value,
        done: taskId.value ? tasks.find(t => t.id === taskId.value)?.done || false : false,
        createdAt: taskId.value ? tasks.find(t => t.id === taskId.value)?.createdAt : new Date().toISOString()
      };

      if (taskId.value) {
        tasks = tasks.map(task => task.id === taskId.value ? data : task);
      } else {
        tasks.push(data);
      }

      saveTasks();
      closeForm();
    });

    window.toggleDone = function(id) {
      tasks = tasks.map(task => task.id === id ? { ...task, done: !task.done } : task);
      saveTasks();
    }

    window.editTask = function(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      taskId.value = task.id;
      nameInput.value = task.name;
      descInput.value = task.description;
      requestedByInput.value = task.requestedBy;
      priorityInput.value = task.priority;
      dateInput.value = task.date;

      document.getElementById("formTitle").textContent = "Editar tarefa";
      openForm();
    }

    window.deleteTask = function(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      if (confirm(`Excluir a tarefa "${task.name}"?`)) {
        tasks = tasks.filter(task => task.id !== id);
        saveTasks();
      }
    }

    function escapeHTML(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("openForm").addEventListener("click", () => {
      resetForm();
      openForm();
    });

    document.getElementById("cancelForm").addEventListener("click", closeForm);

    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        currentFilter = chip.dataset.filter;
        renderTasks();
      });
    });

    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        const view = btn.dataset.view;
        document.getElementById("dashboardView").classList.toggle("hidden", view !== "dashboard");
        document.getElementById("tasksView").classList.toggle("hidden", view === "about");
        document.getElementById("aboutView").classList.toggle("hidden", view !== "about");

        if (view === "dashboard") {
          document.getElementById("tasksView").classList.remove("hidden");
        }
      });
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "backup-tarefas-saf.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      document.getElementById("importFile").click();
    });

    document.getElementById("importFile").addEventListener("change", event => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported)) throw new Error();
          tasks = imported;
          saveTasks();
          alert("Backup importado com sucesso.");
        } catch {
          alert("Arquivo inválido.");
        }
      };
      reader.readAsText(file);
    });

    resetForm();
    render();
  </script>
</body>
</html>
